# This compose file runs the full distributed stack:
#   - PostgreSQL (persistent storage)
#   - Redis (presence, pub/sub, rate limiting)
#   - Zookeeper + Kafka (async event streaming / notifications)
#   - backend-1 on port 8080 and backend-2 on port 8081 (two instances to prove distribution)
#   - frontend (React)
#   - nginx (load balancer, reverse proxy)
#
# KEY DEMO:
#   Open browser tab A -> connects to backend-1 (via STOMP)
#   Open browser tab B -> connects to backend-2 (via STOMP)
#   Tab A sends a message -> saved to PG -> Redis pub/sub -> BOTH instances
#   Tab B receives the message in real-time -> distribution proven

services:

  # ──────────────────────────── INFRASTRUCTURE ────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatuser -d chatdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: on-failure
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 6000
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      retries: 15

  # ──────────────────────────── BACKEND INSTANCES ────────────────────────────

  backend-1:
    build:
      context: ./backend
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: chatdb
      DB_USER: chatuser
      DB_PASS: chatpass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      retries: 10

  backend-2:
    build:
      context: ./backend
    environment:
      SERVER_PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: chatdb
      DB_USER: chatuser
      DB_PASS: chatpass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      retries: 10

  # ──────────────────────────── FRONTEND ────────────────────────────

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend-1
      - backend-2

  # ──────────────────────────── LOAD BALANCER ────────────────────────────

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend-1
      - backend-2

volumes:
  pgdata:
