upstream backend {
    least_conn;
    server backend-1:8080;
    server backend-2:8081;
}

server {
    listen 80;

    # API requests — load balanced across both backend instances
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket — sticky sessions required so STOMP subscriptions stay alive
    # nginx least_conn is used; for full stickiness, use ip_hash below
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Frontend static files
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}
