server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: distributed-chat-platform

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chatdb}
    username: ${DB_USER:chatuser}
    password: ${DB_PASS:chatpass}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: chat-platform
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.chat.platform.kafka"
        spring.json.value.default.type: com.chat.platform.kafka.ChatEvent

app:
  jwt:
    secret: ${JWT_SECRET:3f8a9b2c7d1e4f6a0b5c8d3e9f2a7b4c1d6e9f0a3b6c9d2e5f8a1b4c7d0e3f6}
    expiration-ms: 86400000  # 24 hours

  rate-limit:
    messages-per-10s: 5
    login-per-15m: 20
    room-creation-per-hour: 10

  kafka:
    topics:
      chat-messages: chat-messages
      notifications: chat-notifications

  redis:
    presence-ttl-seconds: 30
    typing-ttl-seconds: 5

logging:
  level:
    com.chat.platform: DEBUG
    org.springframework.web.socket: INFO
